services:
  llama-swap:
    # Pinned to b9853 (v234-vulkan-b9853), probed OK 2026-07-02. Upstream GPU
    # detection is NON-MONOTONIC: b9438, b9592, b9603, b9628 fail (`--list-devices`
    # empty -> silent CPU fallback ~18 t/s); b9519, b9538, b9544, b9570, b9853 work.
    # Always probe `--list-devices` for the RADV device before bumping.
    # Prev known-good: b9570 sha256:d176340e... / b9209 sha256:2c355fd9...
    image: ghcr.io/mostlygeek/llama-swap@sha256:f00c5636b2bd4aefddb8a0fcfe01918440322596d60ec2b33cd1d46bfebc7216
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - "9292:8080"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"
    security_opt:
      - seccomp=unconfined
    volumes:
      - ./models:/models:rw
      - ./hf-cache:/root/.cache/huggingface:rw
      - ./config/llama-swap.yaml:/app/config.yaml:ro
      # Passive crash diagnostics: each model's cmd APPENDS llama-server's
      # stderr here (`2>>`, not `2>` — a truncating redirect erases the crash
      # when llama-swap restarts the model seconds later). See llama-swap.yaml
      # comments for why (llama-swap kills the whole process group on a
      # detected upstream failure, racing out any post-exit shell hook, so
      # exit-code echoing doesn't work reliably — use `exec` + a stderr
      # redirect instead). These files grow unbounded; see host/tuning.md for
      # the logrotate rule.
      - ./logs:/var/log/llama-swap:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - RADV_PERFTEST=nogttspill
