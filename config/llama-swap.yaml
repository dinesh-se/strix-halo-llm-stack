# `-cram 0` on every model — read this before removing it. llama-server has a
# HOST-RAM prompt/idle-slot cache (`-cram`/`--cache-ram`) that defaults to
# 8192 MiB *per model* and is never capacity-enforced properly on Linux
# because of memory overcommit (ggml-org/llama.cpp#22629). On a UMA box the
# host-RAM partition left over after the BIOS carveout is small, so three
# models each growing an 8 GiB host-side cache under sustained agentic load
# will exhaust it — here it escalated from killing llama-server to the kernel
# OOM-killing desktop apps (editor, browser) as collateral. Same failure shape
# as ggml-org/llama.cpp#22372 on this hardware class. `-cram 0` disables that
# cache outright. It is NOT the same mechanism as `--cache-reuse` (live KV
# prefix reuse, on the GPU) — that one is unaffected and still worth having.
# Confirm it took effect: startup logs print
# "--cache-idle-slots requires --cache-ram, disabling".
#
# 1200 (was 600): first-time -hf downloads of ~16 GB models exceeded 10m at
# ~14 MB/s and got killed mid-pull. Cold LOADS (once cached) are still <60s.
healthCheckTimeout: 1200
startPort: 10001
logLevel: info

# Lineup shape: one RESIDENT orchestrator/PA model (never unloads) + a
# dedicated coder + a fast/light aux model, all three co-residable in the
# 96 GiB UMA carveout with no swapping between them. A resident agent-facing
# model needs >=64k real context to be useful for tool-calling agents, which
# is why the biggest model (which would want the whole carveout to itself)
# was dropped from the always-on lineup — see README for the sizing math.

models:
  "aux-fast":
    # llama-server's own stdout/stderr is normally swallowed entirely
    # (confirmed: never appears in `docker logs llama-swap`) — this redirects
    # stderr to a persistent, per-model file so a silent crash has somewhere
    # to leave a trace.
    # Use `2>>` (APPEND), not `2>`. This started as `2>` and that quietly
    # defeated the entire point: llama-swap restarts a crashed model within
    # seconds, and the replacement process truncated the log on startup,
    # erasing the crash that was supposed to be captured. The bug is invisible
    # until the first time you actually need the log — every file looked
    # healthy, just with only post-restart content in it. Appending grows
    # unbounded, so pair it with logrotate (see host/tuning.md).
    # `exec` (not a trailing
    # echo) because llama-swap kills the whole process group on a detected
    # upstream failure — a wrapper shell trying to log the exit code AFTER
    # llama-server dies gets killed in the same sweep before it can run
    # (verified empirically: the echo never fired in a `kill -9` test). `exec`
    # avoids the race by not needing a post-exit code at all; anything
    # llama-server itself prints before dying is captured as it happens.
    # Passive diagnostics only — no verbose logging flags added, no core dumps.
    cmd: |
      /bin/sh -c 'exec /app/llama-server --port ${PORT} --metrics -hf unsloth/gemma-4-12B-it-qat-GGUF:UD-Q4_K_XL --alias aux-fast --jinja -ngl 999 -c 131072 -fa on --cache-type-k q8_0 --cache-type-v q8_0 --no-mmproj --no-webui --temp 1.0 --top-p 0.95 --top-k 64 --spec-type draft-mtp --spec-draft-n-max 4 --reasoning-budget 8192 --reasoning-budget-message "Thinking budget exhausted. Stop reasoning and produce the final response now." -cram 0 2>>/var/log/llama-swap/aux-fast.stderr.log'
    # --no-mmap deliberately OMITTED here: mmap keeps weights file-backed and
    # evictable instead of anonymous RAM. On-demand models reload repeatedly;
    # each --no-mmap load spikes anon RAM, which is a real problem on a host
    # where the BIOS UMA carveout has already taken most of system RAM (see
    # README "VRAM vs GTT" section). Only the always-resident model below
    # carries --no-mmap (it loads once at boot, so the anon-RAM spike is a
    # one-time cost instead of a recurring one).
    # A dense model was chosen over an MoE one here deliberately: for
    # summarization/classification-shaped aux work, a dense model's full
    # parameter count contributes to every token, whereas an MoE model only
    # activates a fraction of its params per token — so a 12B dense model can
    # out-quality a similarly-sized MoE aux model. MTP drafter auto-discovered
    # from the same HF repo's root `mtp-*.gguf` file — no `--model-draft`
    # needed on a recent llama.cpp build. Sampling params per the model
    # publisher's card.
    # GOTCHA (measured on this box): this model THINKS BY DEFAULT even with
    # no system prompt and no explicit trigger — a bare request can burn its
    # entire token budget on a reasoning trace with empty final content
    # (same failure shape as any reasoning model given too small a budget).
    # Pass `chat_template_kwargs: {enable_thinking: false}` in the request
    # body to suppress it cleanly for aux/tool-calling use where you always
    # want a direct answer. `--reasoning-budget` here is a server-side
    # backstop for callers that omit that kwarg.
    # KV quant note: an open llama.cpp issue reports quantized KV cache
    # breaking speculative-decode draft acceptance for this model family on
    # some configs; the model publisher's own docs claim quantized KV works.
    # Verify draft acceptance (stderr log, "draft acceptance = ...") after any
    # upgrade — fall back to unquantized KV if acceptance craters.
    # Fast/light on-demand companion for aux work (compression, titles,
    # background classification/extraction). Co-residable with both other
    # models (swap:false group), idle-evicted after 600s.
    ttl: 600

  "coder":
    # See aux-fast's comment above for why `exec` + stderr redirect, not a
    # post-exit echo.
    # --cache-reuse 256: salvages prompt-cache chunks across context
    # compactions / agent-session boundaries so unrelated later turns don't
    # force a full re-prefill of the whole system prompt + tool schema.
    cmd: |
      /bin/sh -c 'exec /app/llama-server --port ${PORT} --metrics -hf unsloth/Qwen3.6-27B-MTP-GGUF:IQ4_XS --alias coder --jinja -ngl 999 -c 131072 -fa on --cache-type-k q4_0 --cache-type-v q4_0 --cache-reuse 256 --no-mmproj --no-webui -b 2048 -ub 1024 --spec-type draft-mtp --spec-draft-n-max 2 --reasoning-budget 8192 --reasoning-budget-message "Thinking budget exhausted. Stop reasoning and produce the final response now." -cram 0 2>>/var/log/llama-swap/coder.stderr.log'
    # DEDICATED CODER: SWE-bench-V 77.2%, 14.6 GiB weights, ~25 GiB total
    # @128k q4 KV. Measured on this box: 27.8 t/s decode, 85% MTP accept,
    # prefill ~280 t/s at 21k depth.
    # -b 2048 / -ub 1024: a large logical batch (-b) still gives fast prefill
    # of big diff/task prompts (coding-agent prompts often carry a full diff
    # plus file context), but the PHYSICAL batch (-ub) is deliberately kept
    # lower here. Why: `-ub` governs how much work a single GPU dispatch does,
    # and amdgpu's compute-ring timeout is per-dispatch (10s by default). At
    # -ub 2048 this model produced kernel `ring comp_1.x.x timeout ... Process
    # llama-server` events under heavy prefill. The ring reset itself
    # "succeeds" ("device wedged, but recovered through reset"), but the
    # process's Vulkan context does not always survive it — llama.cpp then
    # dies of SIGABRT with a lost-device error, mid-stream, and the client
    # sees a request that hangs for minutes and returns an empty body.
    # Halving -ub shortens the longest dispatch. Not a kernel regression: the
    # same timeouts occurred across two different kernel releases here.
    # If you hit unexplained mid-stream deaths on Vulkan, check
    # `journalctl -k | grep "ring .* timeout"` BEFORE suspecting your config —
    # llama-swap reports it only as "upstream exited unexpectedly", which
    # looks identical to an OOM kill but is a completely different failure.
    # --reasoning-budget 8192: coding-agent loops are mostly mechanical; a
    # generous budget here just lets a routine lint-fix turn "think" for
    # several minutes with no quality payoff. The orchestrator model below
    # keeps a much bigger budget for genuine design/decomposition work.
    # -c 131072: agentic build/integration turns (npm install, test runners,
    # browser automation, git) can jump the context window by tens of
    # thousands of tokens in a single tool-chaining turn — a smaller window
    # risks a mid-turn overflow with no graceful degradation.
    # ttl 1800 (not 0 / always-resident): long tool-execution gaps with zero
    # LLM calls (installs, test suites, browser automation) can exceed a
    # short idle timeout and evict the model mid-workflow; the next request
    # then lands on a dead connection right at the eviction race, surfacing
    # as a client-side "request timed out" with no useful server-side error.
    # 30 minutes comfortably covers a typical build-turn gap without pinning
    # this model alongside the resident one (a config shape that has caused a
    # multi-hour OOM-thrash freeze on this box before — do not make more than
    # one model resident at once without deliberately re-checking the host
    # RAM budget).
    ttl: 1800
    # timeouts.connect 60 (default is 30): defense-in-depth alongside the ttl
    # bump above — give the initial TCP dial more slack too. Cheap; the ttl
    # bump is what actually reduces exposure to the eviction race.
    timeouts:
      connect: 60

  "orchestrator":
    # Role aliases: clients pin a stable role name instead of the underlying
    # model id, so a future model swap only requires moving this block —
    # every caller's config stays untouched. Gotcha: aliases route requests
    # but are NOT listed in `/v1/models`.
    aliases:
      - "classifier"
      - "extractor"
    # See aux-fast's comment above for why `exec` + stderr redirect, not a
    # post-exit echo.
    # --cache-reuse 256: a long multi-hour agent run can spend more wall
    # clock in prefill than generation if every context compaction destroys
    # the single slot's prompt cache and forces a full re-prefill of the
    # unchanged system-prompt/tools/early-history prefix. Chunked prefix
    # reuse salvages that unchanged prefix even when the conversation middle
    # diverges (e.g. a compaction summary). Zero memory cost.
    # NOTE: --parallel 2 was considered (for orchestrator + child-process
    # cache coexistence) and deliberately NOT applied — it needs a much
    # larger context allocation (~2x KV), which is not worth the risk on a
    # box with a documented OOM-thrash history from exactly that kind of
    # memory pressure.
    # --no-mmproj: several of these HF repos ship a vision mmproj that
    # llama-server auto-loads by default even for text-only use, and
    # multimodal loading can silently disable other features (e.g.
    # cache_reuse) with only a log-line warning to notice by. If your
    # downstream client declares the model text-only, the projector is dead
    # weight — skip it explicitly rather than relying on auto-detection.
    cmd: |
      /bin/sh -c 'exec /app/llama-server --port ${PORT} --metrics -hf unsloth/Qwen3.6-35B-A3B-MTP-GGUF:Q8_0 --alias orchestrator --jinja -ngl 999 -c 131072 -fa on --cache-type-k q8_0 --cache-type-v q8_0 --cache-reuse 256 --no-mmproj -b 2048 -ub 2048 --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0 --spec-type draft-mtp --spec-draft-n-max 3 --reasoning-budget 16384 --reasoning-budget-message "Thinking budget exhausted. Stop reasoning and produce the final response now." --no-mmap --no-webui -cram 0 2>>/var/log/llama-swap/orchestrator.stderr.log'
    # --reasoning-budget 16384: bounds thinking-mode spirals — an unbounded
    # budget let one real request generate ~64k tokens of pure reasoning
    # trace (no answer) and pin the GPU for the better part of 20 minutes at
    # full context fill. A client-side max_tokens cap is a useful backstop
    # too, since the model can ignore the server-side budget end-marker
    # under tight budgets.
    # RESIDENT orchestrator/PA model. Q8_0 (~37 GiB) — near-lossless quant
    # chosen deliberately because small-active-parameter MoE models degrade
    # more under 4-bit quantization than dense models of similar size,
    # particularly for tool-call fidelity. ~44 GiB live @131k q8 KV.
    # ttl 0 = never auto-unload.
    ttl: 0

groups:
  # No swapping anywhere — all three fit together within the carveout with
  # headroom to spare. The orchestrator is persistent; coder and aux-fast
  # load on demand and co-reside (swap:false), so aux calls never queue
  # behind a long-running coding session.
  "resident":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "orchestrator"
  "ondemand":
    swap: false
    exclusive: false
    members:
      - "aux-fast"
      - "coder"
